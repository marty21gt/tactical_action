function blend(c){c=c.filter(x=>x!=null&&!isNaN(x));if(!c.length)return NaN;const s=[...c].sort((a,b)=>b-a);const tail=s.length>=2?(s[0]+s[1])/2:s[0];return .7*(c.reduce((a,b)=>a+b,0)/c.length)+.3*tail;}
function quad(v,t){const hv=v>=CONFIG.Vth,ht=t>=CONFIG.Tth;return ht?(hv?["Danger","q-danger"]:["Stress","q-stress"]):(hv?["Elevated","q-elev"]:["Calm","q-calm"]);}
function realizedVol(px,i,w=20,fl=0.10){let s=0;for(let k=i-w+1;k<=i;k++){const r=Math.log(px[k]/px[k-1]);s+=r*r;}return Math.max(Math.sqrt(s/w*252),fl);}
function slopePct(ma,i,w=21){const xm=(w-1)/2;let ym=0;for(let k=0;k<w;k++)ym+=ma[i-w+1+k];ym/=w;let n=0,dn=0;for(let k=0;k<w;k++){const xd=k-xm;n+=xd*(ma[i-w+1+k]-ym);dn+=xd*xd;}return (n/dn)*252/ma[i];}
function debounce(Td){let cur=true,out=[];for(const t of Td){if(cur&&t>=CONFIG.tCut)cur=false;else if(!cur&&t<CONFIG.tRestore)cur=true;out.push(cur);}return out;}
function targetExp(pos,levOK,px,ma,vol,slope){const{tv,cap}=CONFIG;if(pos===0)return 0;if(!levOK)return 1;if(px>ma&&slope>0.03)return Math.max(1,Math.min(tv/vol,cap));return 1;}
function banded(ts,b){let cur=0,out=[];for(const t of ts){if(Math.abs(t-cur)>b)cur=t;out.push(cur);}return out;}
function alloc(e){if(e===0)return{txt:"100% SGOV"};if(e<=1)return{txt:"100% QQQ"};return{txt:Math.round((2-e)*100)+"% QQQ / "+Math.round((e-1)*100)+"% QLD"};}
function build(D){
  const{dates,px,ma,Td,pos}=D,n=dates.length,start=44;
  const levOKs=debounce(Td);
  const targets=[];for(let i=0;i<n;i++){targets.push(i<start?0:targetExp(pos[i],levOKs[i],px[i],ma[i],realizedVol(px,i,20,CONFIG.floor),slopePct(ma,i,21)));}
  const held=banded(targets,CONFIG.band);
  const i=n-1,vol=realizedVol(px,i,20,CONFIG.floor),slope=slopePct(ma,i,21);
  const curHeld=held[i],changed=Math.abs(held[i]-held[i-1])>1e-9;
  document.getElementById('asof').textContent="as of close "+dates[i]+"  ·  QQQ/QLD tactical  (tv "+CONFIG.tv+", cap "+CONFIG.cap+", daily-T gate)";
  const a=alloc(curHeld),ac=document.getElementById('actionCard');
  document.getElementById('bigAction').textContent="HOLD "+a.txt;
  document.getElementById('levLine').textContent=curHeld===0?"out of the market":("effective exposure "+curHeld.toFixed(2)+"x");
  ac.style.borderColor=curHeld===0?"rgba(224,85,85,.4)":(curHeld>1?"rgba(62,207,142,.35)":"rgba(224,169,11,.35)");
  const b=document.getElementById('changeBanner');
  if(changed){b.className="banner trade";b.textContent="REBALANCE tomorrow — "+alloc(held[i-1]).txt+" → "+a.txt;}else{b.className="banner hold";b.textContent="No change — hold current position";}
  const ag=D.acting_gate,cur=D.current;
  const[tq2,tqc]=quad(ag.V,ag.T);document.getElementById('tradeVT').textContent="V "+ag.V.toFixed(2)+"   T "+ag.T.toFixed(2)+"   ("+ag.month+")";
  document.getElementById('tradeWhy').textContent=ag.armed?"ARMED — in danger; watching 200-day for exit":"not armed — no risk-off signal";
  const tqEl=document.getElementById('tradeQuad');tqEl.textContent=tq2;tqEl.className="quad "+tqc;
  const[cq2,cqc]=quad(cur.V,cur.T);document.getElementById('curVT').textContent="V "+cur.V.toFixed(2)+"   T "+cur.T.toFixed(2);
  const cqEl=document.getElementById('curQuad');cqEl.textContent=cq2;cqEl.className="quad "+cqc;
  const Tg=Td[i],levOK=levOKs[i];
  document.getElementById('tK').textContent="daily T = "+Tg.toFixed(2);
  document.getElementById('tWhy').textContent=levOK?"leverage permitted (below 0.60, or above 0.50 after a cut)":"leverage OFF — daily T in the cut zone, hold 1x";
  const tp=document.getElementById('tPill');tp.textContent=levOK?"LEV OK":"NO LEV";tp.className="pill "+(levOK?"on":"warn");
  const on=pos[i]===1,trendUp=px[i]>ma[i],slopeUp=slope>0.03,wants=Math.min(CONFIG.tv/vol,CONFIG.cap);
  document.getElementById('dK').textContent="wants "+wants.toFixed(2)+"x   (vol "+(vol*100).toFixed(0)+"%, slope "+(slope*100).toFixed(0)+"%)";
  document.getElementById('dWhy').textContent=(trendUp?"price>200d":"price<200d")+" · "+(slopeUp?"slope rising":"slope flat/falling");
  const levering=on&&levOK&&trendUp&&slopeUp&&wants>1,dp=document.getElementById('dPill');dp.textContent=levering?"LEVERING":"1x";dp.className="pill "+(levering?"on":"warn");
  document.getElementById('foot').innerHTML="Rules: monitor risk-off → 100% SGOV. Else daily-T gate (cut "+CONFIG.tCut+" / restore "+CONFIG.tRestore+") permits leverage; if permitted + price>200-day + slope rising → vol-target "+CONFIG.tv+"/realized-vol, capped "+CONFIG.cap+"x, floored 1x. Rebalance only when target moves >"+(CONFIG.band*100)+"%. SGOV decision uses the monthly trade reading; leverage uses the daily T. Educational — not investment advice.";
}
Promise.all([fetch(CONFIG.dataUrl).then(r=>r.json()),fetch(CONFIG.dailyVtUrl).then(r=>r.json())]).then(([j,dvj])=>{
  const tq=j.timeline_qqq,N=260,L=tq.dates.length;
  const tdMap={};dvj.dates.forEach((dt,k)=>tdMap[dt]=dvj.Td[k]);
  const dts=tq.dates.slice(L-N);let last=0.5;const Td=dts.map(dt=>{const v=tdMap[dt];if(v!=null)last=v;return last;});
  const cur={V:blend(j.current.vulnerability.filter(x=>x.score).map(x=>x.frag)),T:blend(j.current.trigger.filter(x=>x.score).map(x=>x.frag))};
  build({dates:dts,px:tq.px.slice(L-N),ma:tq.ma.slice(L-N),Td:Td,pos:tq.pos.slice(L-N).map(Number),acting_gate:j.acting_gate,current:cur});
  document.getElementById('src').textContent="live · data.json + daily_vt.json";
}).catch(e=>{build(SNAP);document.getElementById('src').textContent="offline snapshot (through "+SNAP.dates[SNAP.dates.length-1]+") — set CONFIG urls to go live";});
</script>
